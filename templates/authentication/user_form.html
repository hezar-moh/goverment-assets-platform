{% extends 'shared/base.html' %}
{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{% url 'user_list' %}" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="fw-bold mb-0">{{ page_title }}</h4>
</div>

<div class="card stat-card" style="max-width: 700px;">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">First Name <span class="text-danger">*</span></label>
                    <input type="text" name="first_name" class="form-control"
                           value="{{ form_data.first_name|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Last Name <span class="text-danger">*</span></label>
                    <input type="text" name="last_name" class="form-control"
                           value="{{ form_data.last_name|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control"
                           value="{{ form_data.username|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ form_data.email|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Role <span class="text-danger">*</span></label>
                    <select name="role" class="form-select" required>
                        <option value="">— Select role —</option>
                        {% for role in allowed_roles %}
                        <option value="{{ role }}"
                            {% if form_data.role == role %}selected{% endif %}>
                            {{ role }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                {% if creator_role == 'SUPER_ADMIN' %}
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Ministry Schema <span class="text-danger">*</span></label>
                    <select name="ministry_schema" class="form-select">
                        <option value="">— Select ministry —</option>
                        {% for ministry in ministries %}
                        <option value="{{ ministry.schema_name }}"
                            {% if form_data.ministry_schema == ministry.schema_name %}selected{% endif %}>
                            {{ ministry.name }} ({{ ministry.schema_name }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control"
                           minlength="8" required>
                    <div class="form-text">Minimum 8 characters</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <div class="col-12 d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-person-check me-1"></i> Create User
                    </button>
                    <a href="{% url 'user_list' %}" class="btn btn-outline-secondary px-4">
                        Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
